<!DOCTYPE html>
<html>
<head>
  <title>Sweetu Pro Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      font-family: Arial;
      color: white;
      text-align: center;
      transition: 0.3s;
    }

    .dark {
      background: #111;
      color: #fff;
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      background: rgba(0,0,0,0.7);
    }

    .nav-links button {
      margin: 5px;
      padding: 8px;
      background: gold;
      border: none;
      border-radius: 5px;
    }

    .container { margin-top: 80px; }

    .box {
      margin: 15px auto;
      padding: 20px;
      width: 90%;
      max-width: 350px;
      border-radius: 15px;
      background: rgba(0,0,0,0.6);
      transition: 0.3s;
    }

    .box:hover {
      transform: scale(1.05);
    }

    input, textarea {
      padding: 10px;
      margin: 10px;
      width: 90%;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      background: gold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #chatBox { height:200px; overflow:auto; }

    .user-msg { background:#222; padding:6px; margin:5px; }
    .ai-msg { background:green; padding:6px; margin:5px; }

    #notify {
      position: fixed;
      top: 70px;
      right: 10px;
      background: green;
      padding: 10px;
      display: none;
    }
  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body>

<div class="navbar">
  <div>🚀 Sweetu</div>
  <div class="nav-links">
    <button onclick="toggleDark()">🌙</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

<h1>🚀 Sweetu Business Website</h1>

<!-- LOGIN -->
<div class="box">
  <h2>Login</h2>
  <button onclick="googleLogin()">Login with Google</button>
  <p id="user"></p>
</div>

<!-- AI CHAT -->
<div class="box">
  <h2>🤖 AI Assistant</h2>
  <div id="chatBox"></div>
  <input id="aiInput" placeholder="Start chat...">
  <button onclick="askAI()">Send</button>
</div>

<!-- CONTACT -->
<div class="box">
  <h2>Contact</h2>
  <input id="name" placeholder="Your Name">
  <textarea id="message"></textarea>
  <button onclick="sendMessage()">Send</button>
  <p>📧 shkgeeeee@gmail.com</p>
</div>

<!-- PAYMENT -->
<div class="box">
  <h2>💳 Buy Now</h2>
  <button onclick="payNow()">JazzCash Pay</button>
</div>

<!-- REVIEWS -->
<div class="box">
  <h2>⭐ Reviews</h2>
  <p>⭐⭐⭐⭐⭐ Amazing Work!</p>
  <p>⭐⭐⭐⭐⭐ Best Developer</p>
</div>

<div id="notify">Done ✅</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBdyWxAqaHswKhP1CJSGviFFg4h9oMK2Aw",
  authDomain: "sweetu-site.firebaseapp.com",
  projectId: "sweetu-site"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user").innerText =
    user.displayName + " (" + user.email + ")";
  }
});

// LOGOUT
function logout(){
  auth.signOut();
}

// CONTACT
function sendMessage(){
  let name = document.getElementById("name").value;
  let message = document.getElementById("message").value;

  db.collection("messages").add({name,message,time:new Date()});
  alert("Message Sent");
}

// PAYMENT
function payNow(){
  alert("Send to JazzCash: 03016305418");
  showNotify();
}

// DARK MODE
function toggleDark(){
  document.body.classList.toggle("dark");
}

// NOTIFICATION
function showNotify(){
  let n = document.getElementById("notify");
  n.style.display = "block";
  setTimeout(()=>{ n.style.display="none"; },2000);
}

// AI CHAT SIMPLE
function askAI(){
  let input = document.getElementById("aiInput");
  let chat = document.getElementById("chatBox");

  chat.innerHTML += "<p class='user-msg'>"+input.value+"</p>";
  chat.innerHTML += "<p class='ai-msg'>Thanks! We will contact you.</p>";

  input.value="";
}
</script>

</body>
  </html>
