<!DOCTYPE html>
<html>
<head>
  <title>Sweetu Pro Site</title>

  <style>
    body {
      background: black;
      color: gold;
      text-align: center;
      font-family: Arial;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
    }
    button {
      background: gold;
      color: black;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      transform: scale(1.1);
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

</head>
<body>

<h1>Sweetu Business Website</h1>

<!-- 🔹 Contact Info -->
<p>📧 Email: shkgeeeee@gmail.com</p>
<p>📞 Phone: 03016305418</p>

<h2>Signup</h2>
<input id="email" value="shkgeeeee@gmail.com" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<br>
<button onclick="signup()">Signup</button>

<h2>Login</h2>
<button onclick="login()">Login</button>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
  };

  const app = firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function signup() {
    auth.createUserWithEmailAndPassword(
      email.value,
      password.value
    ).then(() => {
      alert("Signup Success");
    }).catch(err => alert(err.message));
  }

  function login() {
    auth.signInWithEmailAndPassword(
      email.value,
      password.value
    ).then(() => {
      alert("Login Success");
    }).catch(err => alert(err.message));
  }
</script>

</body>
</html>
