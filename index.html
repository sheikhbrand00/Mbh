<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Freelance Website</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
height:100vh;
background-size:cover;
background-position:center;
transition:1s;
}

.overlay{
background:rgba(0,0,0,0.6);
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

img{
width:140px;
border-radius:50%;
border:4px solid white;
}

h1{
font-size:40px;
margin:10px;
}

p{
font-size:18px;
}

.button{
display:inline-block;
padding:12px 25px;
margin:10px;
font-size:18px;
color:white;
text-decoration:none;
border-radius:8px;
}

.whatsapp{
background:#25D366;
}

.instagram{
background:#E1306C;
}

/* Floating WhatsApp */

.float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
width:60px;
height:60px;
border-radius:50%;
text-align:center;
font-size:30px;
line-height:60px;
text-decoration:none;
}

/* 🤖 AI BOX */

.ai-box{
position:fixed;
bottom:100px;
right:20px;
width:250px;
background:black;
padding:10px;
border-radius:10px;
}

.ai-box input{
width:90%;
padding:5px;
margin-top:5px;
}

.ai-box button{
margin-top:5px;
padding:5px;
}

#chat p{
font-size:12px;
text-align:left;
margin:5px;
}

</style>

</head>

<body>

<div class="overlay">

<img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde">

<h1>Sweetu</h1>

<p>Freelancer | Web Design | Online Services</p>

<a class="button whatsapp" onclick="startWhatsApp()">
WhatsApp Me
</a>

<a class="button instagram" href="https://www.instagram.com/sweetu_hun_yawr?igsh=MXRndmg1Ym1hbjNzbg==">
Instagram
</a>

</div>

<!-- 🤖 AI BOX -->

<div class="ai-box">
<div id="chat"></div>
<input id="aiInput" placeholder="Type...">
<button onclick="askAI()">Send</button>
</div>

<!-- Floating WhatsApp -->

<a href="#" onclick="startWhatsApp()" class="float">
💬
</a>

<script>

let images=[
"https://images.unsplash.com/photo-1498050108023-c5249f4df085",
"https://images.unsplash.com/photo-1504639725590-34d0984388bd",
"https://images.unsplash.com/photo-1519389950473-47ba0277781c"
];

let i=0;

function changeBackground(){
document.body.style.backgroundImage="url("+images[i]+")";
i++;
if(i==images.length){ i=0; }
}

setInterval(changeBackground,4000);
changeBackground();


// 🤖 AI SYSTEM

let step=0;
let lead={};

function askAI(){

let input=document.getElementById("aiInput");
let chat=document.getElementById("chat");

let text=input.value;
if(text=="") return;

chat.innerHTML += "<p>👤 "+text+"</p>";

let reply="";

if(step==0){
reply="🚀 Welcome!\nName?";
step=1;
}

else if(step==1){
lead.name=text;
reply="😊 What website you need?";
step=2;
}

else if(step==2){
lead.need=text;
reply="💰 Price: 1500 PKR\nInterested? (yes/no)";
step=3;
}

else if(step==3){

if(text.toLowerCase().includes("yes")){

let msg=
"Hello Sweetu!\n"+
"Name: "+lead.name+"\n"+
"Need: "+lead.need+"\n"+
"Budget: 1500 PKR";

let url="https://wa.me/923016305418?text="+encodeURIComponent(msg);

reply="📲 Opening WhatsApp...";

setTimeout(()=>{
window.open(url,"_blank");
},1000);

}else{
reply="👍 Contact later on WhatsApp";
}

step=0;
lead={};
}

setTimeout(()=>{
chat.innerHTML += "<p>🤖 "+reply+"</p>";
},300);

input.value="";
}


// 🔥 WhatsApp Button Smart

function startWhatsApp(){

let msg="Hello Sweetu! I want a website (1500 PKR)";
let url="https://wa.me/923016305418?text="+encodeURIComponent(msg);
window.open(url,"_blank");

}

</script>

</body>
</html>
