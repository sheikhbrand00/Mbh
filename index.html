<!DOCTYPE html>
<html>
<head>
  <title>Sweetu Pro Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      font-family: Arial;
      color: white;
      text-align: center;
      transition: 0.3s;
    }

    .dark {
      background: #111;
      color: #fff;
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      background: rgba(0,0,0,0.7);
    }

    .nav-links button {
      margin: 5px;
      padding: 8px;
      background: gold;
      border: none;
      border-radius: 5px;
    }

    .container { margin-top: 80px; }

    .box {
      margin: 15px auto;
      padding: 20px;
      width: 90%;
      max-width: 350px;
      border-radius: 15px;
      background: rgba(0,0,0,0.6);
      transition: 0.3s;
    }

    .box:hover {
      transform: scale(1.05);
    }

    input, textarea {
      padding: 10px;
      margin: 10px;
      width: 90%;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      background: gold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #chatBox { height:200px; overflow:auto; }

    .user-msg { background:#222; padding:6px; margin:5px; }
    .ai-msg { background:green; padding:6px; margin:5px; }

    #notify {
      position: fixed;
      top: 70px;
      right: 10px;
      background: green;
      padding: 10px;
      display: none;
    }
  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body>

<div class="navbar">
  <div>🚀 Sweetu</div>
  <div class="nav-links">
    <button onclick="toggleDark()">🌙</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

<h1>🚀 Sweetu Business Website</h1>

<!-- LOGIN -->
<div class="box">
  <h2>Login</h2>
  <button onclick="googleLogin()">Login with Google</button>
  <p id="user"></p>
</div>

<!-- AI CHAT -->
<div class="box">
  <h2>🤖 AI Assistant</h2>
  <div id="chatBox"></div>
  <input id="aiInput" placeholder="Start chat...">
  <button onclick="askAI()">Send</button>
  <button onclick="startVoice()">🎤 Speak</button>
</div>

<!-- CONTACT -->
<div class="box">
  <h2>Contact</h2>
  <input id="name" placeholder="Your Name">
  <textarea id="message"></textarea>
  <button onclick="sendMessage()">Send</button>
  <p>📧 shkgeeeee@gmail.com</p>
</div>

<!-- PAYMENT -->
<div class="box">
  <h2>💳 Buy Now</h2>
  <button onclick="payNow()">JazzCash Pay</button>
</div>

<!-- REVIEWS -->
<div class="box">
  <h2>⭐ Reviews</h2>
  <p>⭐⭐⭐⭐⭐ Amazing Work!</p>
  <p>⭐⭐⭐⭐⭐ Best Developer</p>
</div>

<div id="notify">Done ✅</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBdyWxAqaHswKhP1CJSGviFFg4h9oMK2Aw",
  authDomain: "sweetu-site.firebaseapp.com",
  projectId: "sweetu-site"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user").innerText =
    user.displayName + " (" + user.email + ")";
  }
});

// LOGOUT
function logout(){
  auth.signOut();
}

// CONTACT
function sendMessage(){
  let name = document.getElementById("name").value;
  let message = document.getElementById("message").value;

  db.collection("messages").add({name,message,time:new Date()});
  alert("Message Sent");
}

// PAYMENT
function payNow(){
  alert("Send to JazzCash: 03016305418");
  showNotify();
}

// DARK MODE
function toggleDark(){
  document.body.classList.toggle("dark");
}

// NOTIFICATION
function showNotify(){
  let n = document.getElementById("notify");
  n.style.display = "block";
  setTimeout(()=>{ n.style.display="none"; },2000);
}

// 🤖 ADVANCED AI
let lead = { name:"", need:"", budget:"", step:0 };

function askAI() {
  const input = document.getElementById("aiInput");
  const chat = document.getElementById("chatBox");

  let text = input.value.trim();
  if(text === "") return;

  chat.innerHTML += `<p class="user-msg">👤 ${text}</p>`;
  input.value = "";

  chat.innerHTML += `<p class="ai-msg" id="typing">Typing...</p>`;

  setTimeout(() => {
    document.getElementById("typing").remove();

    let reply = "";

    if(lead.step === 0){
      reply = "👋 Welcome! Apna naam batayein 😊";
      lead.step = 1;
    }
    else if(lead.step === 1){
      lead.name = text;
      reply = "Aap kis type ki website chahte hain?";
      lead.step = 2;
    }
    else if(lead.step === 2){
      lead.need = text;
      reply = "Aapka budget kya hai?";
      lead.step = 3;
    }
    else if(lead.step === 3){
      lead.budget = text;
      reply = "Interested? (yes/no)";
      lead.step = 4;
    }
    else if(lead.step === 4){
      if(text.toLowerCase().includes("yes")){
        db.collection("leads").add({
          name: lead.name,
          need: lead.need,
          budget: lead.budget,
          time: new Date()
        });

        let msg = `Name: ${lead.name}\nNeed: ${lead.need}\nBudget: ${lead.budget}`;
        let url = "https://wa.me/923016305418?text=" + encodeURIComponent(msg);

        reply = "Opening WhatsApp...";
        setTimeout(()=>{ window.open(url, "_blank"); },1500);
      } else {
        reply = "Okay 👍";
      }
      lead = { name:"", need:"", budget:"", step:0 };
    }

    chat.innerHTML += `<p class="ai-msg">🤖 ${reply}</p>`;
    chat.scrollTop = chat.scrollHeight;

    localStorage.setItem("chat", chat.innerHTML);

  }, 800);
}

// 💾 LOAD CHAT
window.onload = () => {
  const saved = localStorage.getItem("chat");
  if(saved){
    document.getElementById("chatBox").innerHTML = saved;
  }
};

// 🎤 VOICE AI
function startVoice(){
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";

  recognition.onresult = function(event){
    document.getElementById("aiInput").value = event.results[0][0].transcript;
  };

  recognition.start();
}
</script>

</body>
  </html>
