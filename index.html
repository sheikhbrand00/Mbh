<!DOCTYPE html>
<html>
<head>
  <title>Sweetu Pro Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      text-align: center;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      height: 100vh;
      overflow: hidden;
    }

    /* 🔥 Background Slider FIXED */
    .bg-slider {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      overflow: hidden;
    }

    .bg-slider img {
      position: absolute;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      opacity: 0;
      animation: slideShow 18s infinite;
    }

    .bg-slider img:nth-child(1) { animation-delay: 0s; }
    .bg-slider img:nth-child(2) { animation-delay: 6s; }
    .bg-slider img:nth-child(3) { animation-delay: 12s; }

    @keyframes slideShow {
      0% { opacity: 0; }
      10% { opacity: 1; }
      30% { opacity: 1; }
      40% { opacity: 0; }
      100% { opacity: 0; }
    }

    /* 🔥 Glass Box */
    .box {
      margin: 10px;
      padding: 20px;
      width: 90%;
      max-width: 350px;
      border-radius: 15px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input, textarea {
      padding: 10px;
      margin: 10px;
      width: 90%;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px 20px;
      background: gold;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }

    h1 {
      margin-bottom: 10px;
    }

    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: green;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
      font-size: 20px;
    }
  </style>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>
<body>

<!-- 🔥 Background Images -->
<div class="bg-slider">
  <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f">
  <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085">
  <img src="https://images.unsplash.com/photo-1551434678-e076c223a692">
</div>

<h1>🚀 Sweetu Business Website</h1>

<div class="box">
  <h2>Login with Google</h2>
  <button onclick="googleLogin()">Login with Google</button>
  <p id="user"></p>
</div>

<div class="box">
  <h2>Contact Form</h2>
  <input id="name" placeholder="Your Name">
  <textarea id="message" placeholder="Your Message"></textarea><br>
  <button onclick="sendMessage()">Send Message</button>
</div>

<a class="whatsapp" href="https://wa.me/923016305418">💬</a>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBdyWxAqaHswKhP1CJSGviFFg4h9oMK2Aw",
    authDomain: "sweetu-site.firebaseapp.com",
    projectId: "sweetu-site"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithRedirect(provider);
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("user").innerText = "Welcome " + user.displayName;
    }
  });

  function sendMessage() {
    const name = document.getElementById("name").value;
    const message = document.getElementById("message").value;

    if(name === "" || message === "") {
      alert("Please fill all fields");
      return;
    }

    db.collection("messages").add({
      name: name,
      message: message,
      time: new Date()
    }).then(() => {
      alert("Message Sent ✅");
      document.getElementById("name").value = "";
      document.getElementById("message").value = "";
    });
  }
</script>

</body>
    </html>
