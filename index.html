<!DOCTYPE html>
<html>
<head>
  <title>Sweetu Pro Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      font-family: Arial;
      color: white;
      text-align: center;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .nav-links button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      background: gold;
      cursor: pointer;
    }

    .bg-slider {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      z-index: -2;
    }

    .bg-slider img {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      opacity: 0;
      animation: slideShow 18s infinite;
    }

    .bg-slider img:nth-child(1) { animation-delay: 0s; }
    .bg-slider img:nth-child(2) { animation-delay: 6s; }
    .bg-slider img:nth-child(3) { animation-delay: 12s; }

    @keyframes slideShow {
      0% { opacity: 0; }
      10% { opacity: 1; }
      30% { opacity: 1; transform: scale(1.05); }
      40% { opacity: 0; }
      100% { opacity: 0; }
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: -1;
    }

    .container {
      margin-top: 90px;
    }

    .box {
      margin: 15px auto;
      padding: 20px;
      width: 90%;
      max-width: 350px;
      border-radius: 15px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
    }

    input, textarea {
      padding: 10px;
      margin: 10px;
      width: 90%;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px 20px;
      background: gold;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }

    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: green;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
    }

    #chatBox p {
      margin: 6px;
      padding: 6px;
      border-radius: 6px;
      font-size: 14px;
      text-align:left;
    }

    .user-msg { background: #222; }
    .ai-msg { background: green; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body>

<div class="navbar">
  <div>🚀 Sweetu</div>
  <div class="nav-links">
    <button onclick="scrollToSection('home')">Home</button>
    <button onclick="openWhatsApp()">Contact</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="bg-slider">
  <img src="https://images.unsplash.com/photo-1559027615-cd4628902d4a">
  <img src="https://images.unsplash.com/photo-1551434678-e076c223a692">
  <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d">
</div>

<div class="bg-overlay"></div>

<div class="container" id="home">
  <h1>🚀 Sweetu Business Website</h1>

  <div class="box">
    <h2>Login with Google</h2>
    <button onclick="googleLogin()">Login with Google</button>
    <p id="user"></p>
  </div>

  <div class="box">
    <h2>🤖 AI Assistant</h2>
    <div id="chatBox" style="height:200px;overflow:auto;"></div>
    <input id="aiInput" placeholder="Ask something...">
    <button onclick="askAI()">Send</button>
  </div>

  <div class="box" id="contact">
    <h2>Contact Form</h2>
    <input id="name" placeholder="Your Name">
    <textarea id="message" placeholder="Your Message"></textarea><br>
    <button onclick="sendMessage()">Send Message</button>
  </div>
</div>

<a class="whatsapp" href="https://wa.me/923016305418?text=Hello Sweetu! I want to contact you.">💬</a>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBdyWxAqaHswKhP1CJSGviFFg4h9oMK2Aw",
    authDomain: "sweetu-site.firebaseapp.com",
    projectId: "sweetu-site"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
      .catch((error) => {
        alert("Login Error: " + error.message);
      });
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("user").innerText =
        "👤 " + user.displayName + " (" + user.email + ")";

      db.collection("users").doc(user.uid).set({
        name: user.displayName,
        email: user.email,
        uid: user.uid,
        lastLogin: new Date()
      });
    } else {
      document.getElementById("user").innerText = "";
    }
  });

  function logout() {
    auth.signOut().then(() => {
      alert("Logged out");
    });
  }

  function sendMessage() {
    const name = document.getElementById("name").value;
    const message = document.getElementById("message").value;

    if(name === "" || message === "") {
      alert("Please fill all fields");
      return;
    }

    db.collection("messages").add({
      name: name,
      message: message,
      time: new Date()
    }).then(() => {
      alert("Message Sent ✅");
      document.getElementById("name").value = "";
      document.getElementById("message").value = "";
    });
  }

  function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({ behavior: "smooth" });
  }

  function openWhatsApp() {
    const message = "Hello Sweetu! I want to contact you.";
    const url = "https://wa.me/923016305418?text=" + encodeURIComponent(message);
    window.open(url, "_blank");
  }

  // 🤖 ADVANCED BUSINESS AI
  function askAI() {
    const input = document.getElementById("aiInput");
    const chat = document.getElementById("chatBox");

    let text = input.value.trim();
    if(text === "") return;

    chat.innerHTML += `<p class="user-msg">👤 ${text}</p>`;

    let msg = text.toLowerCase();
    let reply = "";

    if(msg.includes("hello") || msg.includes("hi")) {
      reply = "👋 Welcome! Sweetu Business میں خوش آمدید 🚀";
    }
    else if(msg.includes("price") || msg.includes("cost")) {
      reply = "💰 Website price 2000 PKR ہے\n\n🔥 Special deal میں 1500 PKR تک possible ہے 😉\n\n📲 WhatsApp:\nhttps://wa.me/923016305418";
    }
    else if(msg.includes("discount") || msg.includes("kam")) {
      reply = "🤝 ہم 2000 سے 1500 PKR تک deal کر سکتے ہیں 😎\n\n📲 WhatsApp پر آئیں:\nhttps://wa.me/923016305418";
    }
    else if(msg.includes("website")) {
      reply = "🌐 ہم modern اور fast websites بناتے ہیں 🔥\n\n💰 Price: 2000 PKR (Deal possible 😏)";
    }
    else if(msg.includes("order") || msg.includes("yes")) {
      reply = "🚀 Great! ابھی WhatsApp پر آئیں:\nhttps://wa.me/923016305418";
    }
    else {
      reply = "😊 مزید details کے لیے WhatsApp پر آئیں:\nhttps://wa.me/923016305418";
    }

    setTimeout(() => {
      chat.innerHTML += `<p class="ai-msg">🤖 ${reply.replace(/\n/g,"<br>")}</p>`;
      chat.scrollTop = chat.scrollHeight;
    }, 400);

    input.value = "";
  }
</script>

</body>
  </html>
