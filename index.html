<!DOCTYPE html>
<html>
<head>
  <title>Sweetu Pro Website</title>

  <style>
    body {
      background: black;
      color: gold;
      text-align: center;
      font-family: Arial;
    }
    .box {
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
    }
    input, textarea {
      padding: 10px;
      margin: 10px;
      width: 80%;
    }
    button {
      padding: 10px;
      background: gold;
      border: none;
      cursor: pointer;
    }
    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: green;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
    }
  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

</head>
<body>

<h1>Sweetu Business Website</h1>

<p>📧 Email: shkgeeeee@gmail.com</p>
<p>📞 Phone: 03016305418</p>

<div class="box">
  <h2>Login with Google</h2>
  <button onclick="googleLogin()">Login with Google</button>
  <p id="user"></p>
</div>

<div class="box">
  <h2>Contact Form</h2>
  <input id="name" placeholder="Your Name">
  <textarea id="message" placeholder="Your Message"></textarea><br>
  <button onclick="sendMessage()">Send Message</button>
</div>

<a class="whatsapp" href="https://wa.me/923016305418">💬</a>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBdyWxAqaHswKhP1CJSGviFFg4h9oMK2Aw",
    authDomain: "sweetu-site.firebaseapp.com",
    projectId: "sweetu-site"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithRedirect(provider);
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("user").innerText = "Welcome " + user.displayName;
    }
  });

  function sendMessage() {
    db.collection("messages").add({
      name: name.value,
      message: message.value,
      time: new Date()
    }).then(() => {
      alert("Message Sent");
      name.value = "";
      message.value = "";
    });
  }
</script>

</body>
</html>
