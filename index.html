<!DOCTYPE html>
<html>
<head>
  <title>Sweetu Pro Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      font-family: Arial;
      color: white;
      text-align: center;
      transition: 0.3s;
      background: linear-gradient(to right, #000000, #1a1a1a);
    }

    .dark { background: #111; }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      background: rgba(0,0,0,0.7);
    }

    .nav-links button {
      margin: 5px;
      padding: 8px;
      background: gold;
      border: none;
      border-radius: 5px;
    }

    .container { margin-top: 80px; }

    .box {
      margin: 15px auto;
      padding: 20px;
      width: 90%;
      max-width: 350px;
      border-radius: 15px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px rgba(255,215,0,0.3);
    }

    input, textarea {
      padding: 10px;
      margin: 10px;
      width: 90%;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      background: gold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    #chatBox { height:200px; overflow:auto; }
    .user-msg { background:#222; padding:6px; margin:5px; }
    .ai-msg { background:green; padding:6px; margin:5px; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body>

<div class="navbar">
  <div>🚀 Sweetu</div>
  <div class="nav-links">
    <button onclick="toggleDark()">🌙</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

<h1>🚀 Sweetu Business Website</h1>

<div class="box">
  <h2>Login</h2>
  <button onclick="googleLogin()">Login with Google</button>
  <p id="user"></p>
</div>

<div class="box">
  <h2>🤖 AI Assistant</h2>
  <div id="chatBox"></div>
  <input id="aiInput" placeholder="Start chat...">
  <button onclick="askAI()">Send</button>
  <button onclick="startVoice()">🎤 Speak</button>
  <button onclick="clearChat()">🗑 Clear</button>
</div>

<div class="box">
  <h2>Contact</h2>
  <input id="name" placeholder="Your Name">
  <textarea id="message"></textarea>
  <button onclick="sendMessage()">Send</button>
  <p>📧 shkgeeeee@gmail.com</p>
</div>

<div class="box">
  <h2>💳 Buy Now</h2>
  <button onclick="payNow()">JazzCash Pay</button>
</div>

<div class="box">
  <h2>⭐ Reviews</h2>
  <p>⭐⭐⭐⭐⭐ Amazing Work!</p>
  <p>⭐⭐⭐⭐⭐ Best Developer</p>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBdyWxAqaHswKhP1CJSGviFFg4h9oMK2Aw",
  authDomain: "sweetu-site.firebaseapp.com",
  projectId: "sweetu-site"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user").innerText =
    user.displayName + " (" + user.email + ")";
  } else {
    document.getElementById("user").innerText = "";
  }
});

function logout(){
  auth.signOut().then(()=>{
    document.getElementById("user").innerText = "";
    location.reload();
  });
}

function sendMessage(){
  let name = document.getElementById("name").value;
  let message = document.getElementById("message").value;

  db.collection("messages").add({name,message,time:new Date()});
  alert("Message Sent");
}

function payNow(){
  let msg = "I have paid via JazzCash 03016305418";
  let url = "https://wa.me/923016305418?text=" + encodeURIComponent(msg);
  window.open(url, "_blank");
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

// 🤖 AI
let lead = { name:"", need:"", budget:"", step:1 };

function askAI() {
  const input = document.getElementById("aiInput");
  const chat = document.getElementById("chatBox");

  let text = input.value.trim();
  if(text === "") return;

  chat.innerHTML += `<p class="user-msg">👤 ${text}</p>`;
  input.value = "";

  let reply = "";

  if(lead.step === 1){
    lead.name = text;
    reply = "Aap kis type ki website chahte hain?";
    lead.step = 2;
  }
  else if(lead.step === 2){
    lead.need = text;
    reply = "Aapka budget kya hai?";
    lead.step = 3;
  }
  else if(lead.step === 3){
    lead.budget = text;
    reply = "Interested? (yes/no)";
    lead.step = 4;
  }
  else if(lead.step === 4){
    if(text.toLowerCase().includes("yes")){
      db.collection("leads").add({
        name: lead.name,
        need: lead.need,
        budget: lead.budget,
        time: new Date()
      });

      let msg = `Name: ${lead.name}\nNeed: ${lead.need}\nBudget: ${lead.budget}`;
      let url = "https://wa.me/923016305418?text=" + encodeURIComponent(msg);

      reply = "Opening WhatsApp...";
      setTimeout(()=>{ window.open(url, "_blank"); },1500);
    } else {
      reply = "Okay 👍";
    }
    lead = { name:"", need:"", budget:"", step:1 };
  }

  chat.innerHTML += `<p class="ai-msg">🤖 ${reply}</p>`;
  chat.scrollTop = chat.scrollHeight;
}

// ✅ Fresh start every time
window.onload = () => {
  document.getElementById("chatBox").innerHTML =
  `<p class="ai-msg">🤖 Welcome to Sweetu AI 🚀<br>Apna naam batayein 😊</p>`;
};

// 🗑 Clear Chat
function clearChat(){
  document.getElementById("chatBox").innerHTML =
  `<p class="ai-msg">🤖 Welcome to Sweetu AI 🚀<br>Apna naam batayein 😊</p>`;
  lead = { name:"", need:"", budget:"", step:1 };
}

// 🎤 Voice
function startVoice(){
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "ur-PK";

  recognition.onresult = function(event){
    document.getElementById("aiInput").value = event.results[0][0].transcript;
  };

  recognition.start();
}
</script>

</body>
    </html>
