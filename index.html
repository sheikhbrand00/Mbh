<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBdyWxAqaHswKhP1CJSGviFFg4h9oMK2Aw",
    authDomain: "sweetu-site.firebaseapp.com",
    projectId: "sweetu-site"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
      .catch((error) => {
        alert("Login Error: " + error.message);
      });
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("user").innerText =
        "👤 " + user.displayName + " (" + user.email + ")";

      db.collection("users").doc(user.uid).set({
        name: user.displayName,
        email: user.email,
        uid: user.uid,
        lastLogin: new Date()
      });
    } else {
      document.getElementById("user").innerText = "";
    }
  });

  function logout() {
    auth.signOut().then(() => {
      alert("Logged out");
    });
  }

  function sendMessage() {
    const name = document.getElementById("name").value;
    const message = document.getElementById("message").value;

    if(name === "" || message === "") {
      alert("Please fill all fields");
      return;
    }

    db.collection("messages").add({
      name: name,
      message: message,
      time: new Date()
    }).then(() => {
      alert("Message Sent ✅");
      document.getElementById("name").value = "";
      document.getElementById("message").value = "";
    });
  }

  function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({ behavior: "smooth" });
  }

  function openWhatsApp() {
    const message = "Hello Sweetu! I want to contact you.";
    const url = "https://wa.me/923016305418?text=" + encodeURIComponent(message);
    window.open(url, "_blank");
  }

  // 🤖 ADVANCED AUTO CLIENT CAPTURE + WHATSAPP AI
  let step = 0;
  let lead = {};

  function askAI() {
    const input = document.getElementById("aiInput");
    const chat = document.getElementById("chatBox");

    let text = input.value.trim();
    if(text === "") return;

    chat.innerHTML += `<p class="user-msg">👤 ${text}</p>`;

    let reply = "";

    if(step === 0) {
      reply = "🚀 Welcome!\n\nہم آپ کو earning machine بنا سکتے ہیں 💰\n\nآپ کا نام کیا ہے؟";
      step = 1;
    }

    else if(step === 1) {
      lead.name = text;
      reply = `😊 Nice ${text}!\n\nآپ کو کس type کی website چاہیے؟`;
      step = 2;
    }

    else if(step === 2) {
      lead.need = text;
      reply = "💰 ہم آپ کے لیے professional website بنائیں گے\n\n🔥 Price: 1500 PKR\n\nInterested? (yes/no)";
      step = 3;
    }

    else if(step === 3) {

      if(text.toLowerCase().includes("yes")) {

        // 🔥 FIREBASE SAVE (UNCHANGED)
        db.collection("leads").add({
          name: lead.name,
          need: lead.need,
          time: new Date()
        });

        // 🔥 SMART WHATSAPP AUTO MESSAGE
        const waMessage =
          "👋 Hello Sweetu!\n\n" +
          "Name: " + lead.name + "\n" +
          "Need: " + lead.need + "\n" +
          "Budget: 1500 PKR\n\n" +
          "🚀 I want to start now";

        const url = "https://wa.me/923016305418?text=" + encodeURIComponent(waMessage);

        reply = "🔥 Great!\n\n📲 WhatsApp پر جا رہے ہیں...\n\nDeal start کریں 🚀";

        // 🔥 AUTO REDIRECT
        setTimeout(() => {
          window.open(url, "_blank");
        }, 1500);

      } else {
        reply = "😊 کوئی مسئلہ نہیں!\n\nجب ready ہوں WhatsApp پر آئیں 👍";
      }

      step = 0;
      lead = {};
    }

    setTimeout(() => {
      chat.innerHTML += `<p class="ai-msg">🤖 ${reply.replace(/\n/g,"<br>")}</p>`;
      chat.scrollTop = chat.scrollHeight;
    }, 400);

    input.value = "";
  }
</script>
